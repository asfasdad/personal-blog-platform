name: rollback

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Optional commit SHA to redeploy
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      rollback_sha: ${{ steps.pick.outputs.rollback_sha }}
    steps:
      - name: Select rollback commit
        id: pick
        uses: actions/github-script@v7
        with:
          script: |
            const explicit = `${{ github.event.inputs.target_sha || '' }}`.trim();
            if (explicit) {
              core.setOutput('rollback_sha', explicit);
              return;
            }

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cloudflare-deploy.yml',
              branch: 'main',
              status: 'completed',
              per_page: 30,
            });

            const success = runs.data.workflow_runs.find((run) => run.conclusion === 'success');
            if (!success?.head_sha) {
              core.setFailed('No successful cloudflare deploy run found on main.');
              return;
            }

            core.setOutput('rollback_sha', success.head_sha);

  rollback-deploy:
    runs-on: ubuntu-latest
    needs: resolve-target
    env:
      PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      ROLLBACK_SHA: ${{ needs.resolve-target.outputs.rollback_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.ROLLBACK_SHA }}

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Deploy rollback revision to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ./dist
            --project-name=${{ env.PAGES_PROJECT }}
            --branch=main

      - name: Smoke check rollback deployment
        run: >-
          node ./scripts/smoke/check-routes.mjs
          --base-url "https://${{ env.PAGES_PROJECT }}.pages.dev"
          --report-path ".sisyphus/evidence/task-11-cloudflare-deploy-error.json"

      - name: Upload rollback evidence
        uses: actions/upload-artifact@v4
        with:
          name: task-11-cloudflare-deploy-error
          path: .sisyphus/evidence/task-11-cloudflare-deploy-error.json
