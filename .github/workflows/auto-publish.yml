name: ai-auto-publish

on:
  workflow_dispatch:
    inputs:
      prompt_path:
        description: Prompt fixture path
        required: true
        default: tests/fixtures/prompts/hello-premium-world.json
      run_mode:
        description: mock-pr or manual-mode
        required: true
        default: mock-pr
  schedule:
    - cron: '15 * * * *'

jobs:
  draft-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run prompt-to-draft pipeline
        run: |
          PROMPT_PATH="${{ github.event.inputs.prompt_path || 'tests/fixtures/prompts/hello-premium-world.json' }}"
          RUN_MODE="${{ github.event.inputs.run_mode || 'mock-pr' }}"
          node scripts/publish/run-pipeline.mjs --prompt "$PROMPT_PATH" --mode "$RUN_MODE"
      - name: Validate generated content
        run: pnpm verify:content
      - name: Upload pipeline audit
        uses: actions/upload-artifact@v4
        with:
          name: auto-publish-audit
          path: .sisyphus/evidence/task-10-pipeline-last.json
