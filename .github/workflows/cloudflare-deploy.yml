name: cloudflare-deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'blog-cms' }}
      PRODUCTION_BRANCH: ${{ vars.CLOUDFLARE_PRODUCTION_BRANCH || 'main' }}
    outputs:
      deploy_url: ${{ steps.meta.outputs.deploy_url }}
      deploy_target: ${{ steps.meta.outputs.deploy_target }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm build
        shell: bash
        run: |
          set +e
          pnpm build 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$BUILD_EXIT" -ne 0 ]; then
            SUMMARY=$(tail -n 80 build.log | sed ':a;N;$!ba;s/\n/%0A/g')
            echo "::error::pnpm build failed. Tail output:%0A${SUMMARY}"
            exit "$BUILD_EXIT"
          fi

      - name: Resolve deployment target
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TARGET="preview"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "${PRODUCTION_BRANCH}" ]; then
            TARGET="production"
            BRANCH_NAME="${PRODUCTION_BRANCH}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.target }}"
            if [ "${TARGET}" = "production" ]; then
              BRANCH_NAME="${PRODUCTION_BRANCH}"
            fi
          fi

          DEPLOY_URL="https://${PAGES_PROJECT}.pages.dev"
          if [ "${TARGET}" = "preview" ]; then
            SAFE_BRANCH=$(echo "${BRANCH_NAME}" | tr '/_' '-')
            DEPLOY_URL="https://${SAFE_BRANCH}.${PAGES_PROJECT}.pages.dev"
          fi

          echo "deploy_target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATES=("${PAGES_PROJECT}" "personal-blog-platform" "blog-cms" "blog-158247-xyz")
          UNIQUE_CANDIDATES=()
          for name in "${CANDIDATES[@]}"; do
            if [ -n "$name" ] && [[ ! " ${UNIQUE_CANDIDATES[*]} " =~ " ${name} " ]]; then
              UNIQUE_CANDIDATES+=("$name")
            fi
          done

          DEPLOYED=0
          LAST_LOG=""
          for PROJECT in "${UNIQUE_CANDIDATES[@]}"; do
            echo "Trying Cloudflare Pages project: ${PROJECT}"
            set +e
            pnpm dlx wrangler pages deploy ./dist \
              --project-name="${PROJECT}" \
              --branch="${{ steps.meta.outputs.deploy_branch }}" 2>&1 | tee deploy.log
            DEPLOY_EXIT=${PIPESTATUS[0]}
            set -e

            if [ "$DEPLOY_EXIT" -eq 0 ]; then
              echo "PAGES_PROJECT=${PROJECT}" >> "$GITHUB_ENV"
              DEPLOYED=1
              break
            fi

            LAST_LOG=$(tail -n 120 deploy.log | sed ':a;N;$!ba;s/\n/%0A/g')
            echo "Project ${PROJECT} failed, trying next candidate..."
          done

          if [ "$DEPLOYED" -ne 1 ]; then
            echo "::error::Cloudflare deploy failed for all candidates. Last output:%0A${LAST_LOG}"
            exit 1
          fi

      - name: Wait for deployment propagation
        shell: bash
        run: sleep 10

      - name: Run post-deploy smoke checks
        env:
          DEPLOY_URL: ${{ steps.meta.outputs.deploy_url }}
        run: >-
          node ./scripts/smoke/check-routes.mjs
          --base-url "$DEPLOY_URL"
          --report-path ".sisyphus/evidence/task-11-cloudflare-deploy-${{ steps.meta.outputs.deploy_target }}.json"

      - name: Upload task 11 smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: task-11-cloudflare-deploy-${{ steps.meta.outputs.deploy_target }}
          path: .sisyphus/evidence/task-11-cloudflare-deploy-${{ steps.meta.outputs.deploy_target }}.json
