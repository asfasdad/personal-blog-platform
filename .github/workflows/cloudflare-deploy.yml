name: cloudflare-deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'blog-cms' }}
      PRODUCTION_BRANCH: ${{ vars.CLOUDFLARE_PRODUCTION_BRANCH || 'main' }}
      PRODUCTION_URL: ${{ vars.CLOUDFLARE_PRODUCTION_URL || 'https://blog.158247.xyz' }}
    outputs:
      deploy_url: ${{ steps.meta.outputs.deploy_url }}
      deploy_target: ${{ steps.meta.outputs.deploy_target }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm build
        shell: bash
        run: |
          set +e
          pnpm build 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$BUILD_EXIT" -ne 0 ]; then
            SUMMARY=$(tail -n 80 build.log | sed ':a;N;$!ba;s/\n/%0A/g')
            echo "::error::pnpm build failed. Tail output:%0A${SUMMARY}"
            exit "$BUILD_EXIT"
          fi

      - name: Resolve deployment target
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TARGET="preview"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "${PRODUCTION_BRANCH}" ]; then
            TARGET="production"
            BRANCH_NAME="${PRODUCTION_BRANCH}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.target }}"
            if [ "${TARGET}" = "production" ]; then
              BRANCH_NAME="${PRODUCTION_BRANCH}"
            fi
          fi

          DEPLOY_URL="${PRODUCTION_URL}"

          echo "deploy_target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN is set"
          else
            echo "::error::CLOUDFLARE_API_TOKEN is missing"
            exit 1
          fi

          if [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is set"
          else
            echo "CLOUDFLARE_ACCOUNT_ID is not set; Wrangler will resolve account from token"
          fi

          set +e
          pnpm dlx wrangler deploy --config dist/server/wrangler.json 2>&1 | tee deploy.log
          DEPLOY_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            SUMMARY=$(tail -n 120 deploy.log | sed ':a;N;$!ba;s/\n/%0A/g')
            echo "::error::Cloudflare worker deploy failed. Tail output:%0A${SUMMARY}"
            exit "$DEPLOY_EXIT"
          fi

      - name: Wait for deployment propagation
        shell: bash
        run: sleep 10

      - name: Run post-deploy smoke checks
        env:
          DEPLOY_URL: ${{ steps.meta.outputs.deploy_url }}
        run: >-
          node ./scripts/smoke/check-routes.mjs
          --base-url "$DEPLOY_URL"
          --report-path ".sisyphus/evidence/task-11-cloudflare-deploy-${{ steps.meta.outputs.deploy_target }}.json"

      - name: Upload task 11 smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: task-11-cloudflare-deploy-${{ steps.meta.outputs.deploy_target }}
          path: .sisyphus/evidence/task-11-cloudflare-deploy-${{ steps.meta.outputs.deploy_target }}.json
